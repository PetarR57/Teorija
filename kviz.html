        /* --- OPŠTI STIL (Inspirisan testom) --- */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
            padding: 40px;
            box-sizing: border-box;
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 30px;
            color: #000000;
            font-weight: 800;
        }

        .instruction-bar {
            background-color: #d1d5db; 
            padding: 14px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-top: 3px solid #000000;
            border-bottom: 3px solid #000000;
            margin-bottom: 40px;
        }

        /* --- STILOVI ZA POČETNU STRANICU --- */
        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-top: 1px solid #000000;
            padding-top: 25px;
        }

        .subject-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .subject-content {
            display: flex;
            align-items: center;
            padding: 20px;
            flex-grow: 1;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .subject-number {
            font-weight: bold;
            margin-right: 15px;
            min-width: 30px;
        }

        .subject-badge {
            background-color: #e5e7eb;
            width: 50px;
            align-self: stretch;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            border-left: 1px solid #d1d5db;
            color: #4b5563;
            transition: all 0.2s ease;
        }

        .subject-card:hover {
            border-color: #9ca3af;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
        }

        .subject-card:hover .subject-content {
            background-color: #fef08a; /* Marker žuta */
        }

        .subject-card:hover .subject-badge {
            background-color: #d1d5db;
            color: #000000;
        }

        /* --- STILOVI ZA STRANICU KVIZA --- */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #000000;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .score-box {
            font-weight: bold;
            font-size: 16px;
            background-color: #e5e7eb;
            padding: 8px 15px;
            border-radius: 4px;
        }

        /* --- TIP 1: Zaokruživanje --- */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .option-item:hover:not(.disabled) {
            background-color: #fef08a;
        }
        .option-item input {
            margin-right: 15px;
            transform: scale(1.2);
        }

        /* --- TIP 2: Povezivanje --- */
        .matching-container {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-top: 20px;
        }
        .matching-column {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .match-item {
            padding: 12px;
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .match-item.selected {
            background-color: #bfdbfe;
            border-color: #3b82f6;
        }

        /* --- TIP 3: Dopuna --- */
        .fill-container {
            font-size: 18px;
            line-height: 2;
        }
        .fill-input {
            border: none;
            border-bottom: 2px solid #000000;
            font-size: 18px;
            padding: 2px 8px;
            width: 170px;
            text-align: center;
            outline: none;
            background-color: transparent;
        }
        .correct-answer-text {
            color: #10b981;
            font-weight: bold;
            margin-left: 10px;
        }

        /* --- DRŽAVNE KLASE ZA PROVERU --- */
        .correct-bg { background-color: #d1fae5 !important; border-color: #10b981 !important; }
        .wrong-bg { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
        
        .pair-color-1 { background-color: #e0f2fe !important; border-color: #0284c7 !important; }
        .pair-color-2 { background-color: #fef3c7 !important; border-color: #d97706 !important; }
        .pair-color-3 { background-color: #f3e8ff !important; border-color: #7c3aed !important; }

        .disabled { pointer-events: none; }

        /* --- AKCIJSKA DUGMAD --- */
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 40px;
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;

        .btn {
            padding: 12px 25px;

            font-weight: bold;
            border: 2px solid #000000;
            background-color: #ffffff;
            cursor: pointer;
            text-transform: uppercase;

        }

            color: #ffffff;
        }
        .btn:disabled {
            border-color: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
        }
    </style>

let activeQuestions = [];
let currentQuestionIndex = 0;
let score = 0;

// Lokalne varijable za držanje stanja spajanja parova
let selectedLeftIndex = null;
let currentMatches = {}; 

// --- FUNKCIJA ZA RANDOM PITANJA ---
// --- ИСПРАВЉЕНА ФУНКЦИЈА ЗА МЕШАЊЕ ПИТАЊА БЕЗ ГРЕШКЕ ---
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        // Тачна замена два елемента у низу
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

// --- FUNKCIJA ZA POKRETANJE IZABRANOG KVIZA ---
function startQuiz(subjectKey) {
    activeQuestions = databases[subjectKey];
    if (activeQuestions.length === 0) {
        alert("Ova baza pitanja je trenutno prazna.");
        return;
    }
    currentQuestionIndex = 0;
    score = 0;
    document.getElementById("score").innerText = score;
    
    document.getElementById("home-screen").style.display = "none";
    document.getElementById("quiz-screen").style.display = "block";
    
    loadQuestion();
}

// --- FUNKCIJA ZA NASUMICNE BOJE
const randomColors = [
    { bg: "#e0f2fe", border: "#0284c7" }, // Plava
    { bg: "#fef3c7", border: "#d97706" }, // Narandžasta
    { bg: "#f3e8ff", border: "#7c3aed" }, // Ljubičasta
    { bg: "#dcfce7", border: "#16a34a" }, // Zelena
    { bg: "#fae8ff", border: "#c026d3" }  // Roze
];

// --- RENDERSTVO PITANJA ---
function loadQuestion() {
    const q = activeQuestions[currentQuestionIndex];
    document.getElementById("progress").innerText = `Питање: ${currentQuestionIndex + 1}/${activeQuestions.length}`;
    
    document.getElementById("btn-submit").disabled = false;
    document.getElementById("btn-next").disabled = true;

    const contentArea = document.getElementById("quiz-content");
    contentArea.innerHTML = "";

    if (q.type === "choice") {
        document.getElementById("question-text").innerHTML = q.text;
        let html = `<div class="options-list">`;
        q.options.forEach((opt, idx) => {
            html += `
                <label class="option-item" id="opt-label-${idx}">
                    <input type="radio" name="quiz-opt" value="${idx}">
                    <span>${opt}</span>
                </label>
            `;
        });
        html += `</div>`;
        contentArea.innerHTML = html;

    } else if (q.type === "multiple") {
        document.getElementById("question-text").innerHTML = q.text;
        let html = `<div class="options-list">`;
        q.options.forEach((opt, idx) => {
            html += `
                <label class="option-item" id="opt-label-${idx}">
                    <input type="checkbox" name="quiz-opt" value="${idx}">
                    <span>${opt}</span>
                </label>
            `;
        });
        html += `</div>`;
        contentArea.innerHTML = html;
      } else if (q.type === "matching") {
        document.getElementById("question-text").innerHTML = q.text;
        selectedLeftIndex = null;
        currentMatches = {};
        
        // Dodajemo dugme za brisanje izbora odmah iznad kolona
        let html = `
            <div style="margin-bottom: 15px; display: flex; justify-content: flex-start;">
                <button id="btn-clear-matches" class="btn" style="padding: 6px 12px; font-size: 12px; margin: 0;" onclick="clearMatches()">Obriši izbore</button>
            </div>
        `;
        
        html += `<div class="matching-container">`;
        html += `<div class="matching-column">`;
        q.left.forEach((item, idx) => {
            html += `<div class="match-item left-item" id="left-${idx}" onclick="selectLeft(${idx})">${item}</div>`;
        });
        html += `</div>`;

        html += `<div class="matching-column">`;
        q.right.forEach((item, idx) => {
            html += `<div class="match-item right-item" id="right-${idx}" onclick="selectRight(${idx})">${item}</div>`;
        });
        html += `</div></div>`;
        contentArea.innerHTML = html;

        } else if (q.type === "fill") {
        let textWithInputs = q.text;
        // Проналазимо сваких 12 цртица и мењамо их у input поља: id="fill-input-0", id="fill-input-1"...
        let inputCount = 0;
        while (textWithInputs.includes("____________")) {
            textWithInputs = textWithInputs.replace("____________", `<input type="text" id="fill-input-${inputCount}" class="fill-input" autocomplete="off" style="width: 110px; margin: 0 5px;">`);
            inputCount++;
        }
        document.getElementById("question-text").innerHTML = textWithInputs;
    }

}

// --- MEHANIKA ZA POVEZIVANJE STUBACA ---
function selectLeft(idx) {
    document.querySelectorAll('.left-item').forEach(el => el.classList.remove('selected'));
    selectedLeftIndex = idx;
    document.getElementById(`left-${idx}`).classList.add('selected');
}

// --- F
function selectRight(rightIdx) {
    if (selectedLeftIndex === null) {
        alert("Prvo kliknite na pojam sa leve strane!");
        return;
    }
    
    // Ako je ova desna stavka već bila povezana, brišemo joj staru boju i spoj
    for (let key in currentMatches) {
        if (currentMatches[key] === rightIdx) {
            const staroLevo = document.getElementById(`left-${key}`);
            staroLevo.style.backgroundColor = "#ffffff";
            staroLevo.style.borderColor = "#e5e7eb";
            delete currentMatches[key];
        }
    }

    // Pamćenje novog spoja
    currentMatches[selectedLeftIndex] = rightIdx;

    // Uzimamo nasumičnu boju iz niza na osnovu trenutnog broja spojeva
    const colorIndex = Object.keys(currentMatches).length % randomColors.length;
    const chosenColor = randomColors[colorIndex];

    const leftEl = document.getElementById(`left-${selectedLeftIndex}`);
    const rightEl = document.getElementById(`right-${rightIdx}`);
    
    leftEl.classList.remove('selected');
    
    // Bojenje levog i desnog elementa u istu nasumičnu boju
    leftEl.style.backgroundColor = chosenColor.bg;
    leftEl.style.borderColor = chosenColor.border;
    
    rightEl.style.backgroundColor = chosenColor.bg;
    rightEl.style.borderColor = chosenColor.border;

    selectedLeftIndex = null;
}

// --- FUNKCIJA ZA BRISANJE SVIH SPOJEVA ---
function clearMatches() {
    if (document.getElementById("btn-submit").disabled) return; // Ne dozvoljavaj brisanje ako je već potvrđeno
    
    selectedLeftIndex = null;
    currentMatches = {};

    // Vraćamo sve elemente u obe kolone na fabrički izgled
    document.querySelectorAll('.match-item').forEach(el => {
        el.classList.remove('selected');
        el.style.backgroundColor = "#ffffff";
        el.style.borderColor = "#e5e7eb";
    });
}

// --- PROVERA ODGOVORA ---
// --- ПРОВЕРА ОДГОВОРА (Комплетна функција са исправљеним бојењем) ---
// --- ПРОВЕРА ОДГОВОРА (Унапређено насумично бојење за нетачно повезивање) ---
function checkAnswer() {
    const q = activeQuestions[currentQuestionIndex];
    let is100PercentCorrect = false;

    document.getElementById("btn-submit").disabled = true;
    document.getElementById("btn-next").disabled = false;

    if (q.type === "choice") {
        const selected = document.querySelector('input[name="quiz-opt"]:checked');
        const userAns = selected ? parseInt(selected.value) : null;
        
        document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled'));

        if (userAns === q.correct) {
            is100PercentCorrect = true;
            document.getElementById(`opt-label-${userAns}`).classList.add('correct-bg');
        } else {
            if (userAns !== null) {
                document.getElementById(`opt-label-${userAns}`).classList.add('wrong-bg');
            }
            document.getElementById(`opt-label-${q.correct}`).classList.add('correct-bg');
        }

    } else if (q.type === "multiple") {
        // Онемогућавамо даљи клик
        document.querySelectorAll('.option-item').forEach(el => el.classList.add('disabled'));
        
        // Скупљамо све индексе које је корисник чекирао
        const checkedBoxes = document.querySelectorAll('input[name="quiz-opt"]:checked');
        const userAnswers = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
        
        let allCorrectChecked = true;
        
        // Пролазимо кроз све понуђене опције да бисмо их правилно обојили
        q.options.forEach((_, idx) => {
            const isCorrect = q.correct.includes(idx);
            const isUserChecked = userAnswers.includes(idx);
            const labelEl = document.getElementById(`opt-label-${idx}`);
            
            if (isCorrect) {
                // Све што је заиста тачно бојимо у зелено
                labelEl.classList.add('correct-bg');
                if (!isUserChecked) {
                    allCorrectChecked = false; // Корисник је пропустио тачан одговор
                }
            } else {
                if (isUserChecked) {
                    // Ако је чекирао нешто што није тачно, бојимо у црвено
                    labelEl.classList.add('wrong-bg');
                    allCorrectChecked = false; // Корисник је означио нетачан одговор
                }
            }
        });
        
        if (allCorrectChecked) {
            is100PercentCorrect = true;
        }
    }     else if (q.type === "matching") {
        // 1. Онемогућавамо даљи клик и ПОТПУНО БРИШЕМО привремене боје корисника
        document.querySelectorAll('.match-item').forEach(el => {
            el.classList.add('disabled');
            el.style.backgroundColor = ""; 
            el.style.borderColor = "";     
        });
        
        // Сакривамо дугме за брисање
        const clearBtn = document.getElementById("btn-clear-matches");
        if (clearBtn) clearBtn.style.display = "none";

        let matchCorrect = true;

        // 2. Проверавамо да ли су сви парови тачни
        for (let lIdx in q.correctPairs) {
            let rIdxCorrect = q.correctPairs[lIdx];
            let rIdxUser = currentMatches[lIdx];

            if (rIdxUser !== rIdxCorrect) {
                matchCorrect = false;
            }
        }

        if (matchCorrect) {
            // Ако је СВЕ тачно, бојимо све у ЗЕЛЕНО
            is100PercentCorrect = true;
            document.querySelectorAll('.match-item').forEach(el => {
                el.classList.add('correct-bg');
            });
        } else {
            // Ако има ГРЕШАКА, прво враћамо оригинални текст на левој страни (ИСПРАВЉЕНО: innerHTML уместо innerText)
            q.left.forEach((item, idx) => {
                document.getElementById(`left-${idx}`).innerHTML = item;
            });

            // 3. ПОВЕЗИВАЊЕ ТАЧНИХ ОДГОВОРА ИСТОМ НАСУМИЧНОМ БОЈОМ
            let colorIndex = 0;
            for (let lIdx in q.correctPairs) {
                let rIdxCorrect = q.correctPairs[lIdx];
                
                // Узимамо боју из вашег низа randomColors
                const chosenColor = randomColors[colorIndex % randomColors.length];
                
                const leftEl = document.getElementById(`left-${lIdx}`);
                const rightEl = document.getElementById(`right-${rIdxCorrect}`);
                
                // Додељујемо идентичну боју и левој и десној коцкици која чини тачан пар
                leftEl.style.backgroundColor = chosenColor.bg;
                leftEl.style.borderColor = chosenColor.border;
                
                rightEl.style.backgroundColor = chosenColor.bg;
                rightEl.style.borderColor = chosenColor.border;
                
                colorIndex++;
            }

            // 4. ОЗНАЧАВАЊЕ ГРЕШАКА БЕЗ СКИДАЊА БОЈЕ (Додајемо само текстуални знак [X] у црвеној боји)
            for (let lIdx in currentMatches) {
                if (currentMatches[lIdx] !== q.correctPairs[lIdx]) {
                    const pogresnoLevo = document.getElementById(`left-${lIdx}`);
                    
                    // Креирамо мали црвени маркер за грешку
                    const errorBadge = document.createElement("span");
                    errorBadge.style.color = "#ef4444";
                    errorBadge.style.fontWeight = "bold";
                    errorBadge.style.marginLeft = "10px";
                    errorBadge.innerText = " [X]";
                    
                    // Додајемо га поред текста, док обојена позадина пара остаје нетакнута
                    pogresnoLevo.appendChild(errorBadge);
                }
            }
        }

        } else if (q.type === "fill") {
        let allFieldsCorrect = true;
        
        // Пошто у овом типу q.correct може бити низ низова (за више поља), пролазимо кроз сваки input
        const isMultipleFields = Array.isArray(q.correct) && Array.isArray(q.correct[0]);
        const fieldsToValidate = isMultipleFields ? q.correct.length : 1;

        for (let i = 0; i < fieldsToValidate; i++) {
            const inputField = document.getElementById(`fill-input-${i}`) || document.getElementById("fill-input-field");
            if (!inputField) continue;
            
            const userAns = inputField.value.trim().toLowerCase();
            inputField.disabled = true;

            // Извлачимо дозвољене варијанте за тренутно поље
            const allowedAnswers = isMultipleFields ? q.correct[i] : (Array.isArray(q.correct) ? q.correct : [q.correct]);
            const normalizedAllowed = allowedAnswers.map(v => v.toString().toLowerCase());

            if (normalizedAllowed.includes(userAns)) {
                inputField.classList.add('correct-bg');
            } else {
                inputField.classList.add('wrong-bg');
                allFieldsCorrect = false;
                
                // Приказ званичног тачног одговора поред поља
                const correctSpan = document.createElement("span");
                correctSpan.className = "correct-answer-text";
                correctSpan.innerText = `(${allowedAnswers[0]})`;
                inputField.parentNode.insertBefore(correctSpan, inputField.nextSibling);
            }
        }

        if (allFieldsCorrect) {
            is100PercentCorrect = true;
        }
    }


    if (is100PercentCorrect) {
        score += q.points ? q.points : 1; 
        document.getElementById("score").innerText = score;
    }
}

// --- SLEDEĆE PITANJE ILI FINIŠ ---
// --- КОМПЛЕТНА ИСПРАВЉЕНА ФУНКЦИЈА ЗА СЛЕДЕЋЕ ПИТАЊЕ И КРАЈ ТЕСТА ---
function nextQuestion() {
    currentQuestionIndex++;
    
    // Ако има још питања, учитавамо следеће
    if (currentQuestionIndex < activeQuestions.length) {
        loadQuestion();
    } else {
        // --- ОВДЕ ПОЧИЊЕ КРАЈ КВИЗА ---
        
        // 1. Прво заустављамо тајмер ако га користите
        if (typeof timerInterval !== 'undefined') clearInterval(timerInterval);
        
        // 2. САБИРАМО МАКСИМАЛНЕ ПОЕНЕ СВИХ ЗАДАТАКА ИЗ ИЗАБРАНЕ БАЗЕ
        let maxScore = 0;
        activeQuestions.forEach(q => {
            maxScore += q.points ? q.points : 1; // Ако случајно нема points, рачуна се 1 поен као резерва
        });

        // 3. Рачунамо проценат успешности на основу стварног максималног броја бодова
        const percentage = Math.round((score / maxScore) * 100);
        const hasPassed = percentage >= 51; // Пролаз на 51% или више

        // 4. Чистимо екран за приказ резултата
        document.getElementById("quiz-content").innerHTML = "";
        document.getElementById("btn-submit").style.display = "none";
        
        // Подешавамо велику сиву траку да прикаже главни статус
        const textBar = document.getElementById("question-text");
        textBar.style.textAlign = "center";
        
        if (hasPassed) {
            textBar.style.backgroundColor = "#d1fae5"; // Светло зелена позадина за пролаз
            textBar.style.borderColor = "#10b981";
            textBar.innerText = "ТЕСТ ЈЕ ЗАВРШЕН! ПОЛОЖИЛИ СТЕ!";
        } else {
            textBar.style.backgroundColor = "#fee2e2"; // Светло црвена позадина за пад
            textBar.style.borderColor = "#ef4444";
            textBar.innerText = "ТЕСТ ЈЕ ЗАВРШЕН! НИСТЕ ПОЛОЖИЛИ!";
        }

        // 5. Убацујемо детаљну статистику бодова у садржај
        let htmlText = `
            <div style="text-align: center; padding: 20px; font-size: 18px; line-height: 1.8;">
                Успешност: <strong>${percentage}%</strong><br>
                Освојени бодови: <strong>${score}</strong> од укупно могућих <strong>${maxScore}</strong> бодова.<br><br>
                ${hasPassed ? 'Честитамо! Спремни сте за полагање матуре.' : 'Препоручујемо да обновите градиво и покушате поново.'}
            </div>
        `;
        document.getElementById("quiz-content").innerHTML = htmlText;
        
        // 6. Трансформишемо "Следеће" дугме у дугме за повратак на почетну страну
        const nextBtn = document.getElementById("btn-next");
        nextBtn.innerText = "Назад на почетну";
        nextBtn.setAttribute("onclick", "resetToHome()");
    }
}


// --- RESET I POVRATAK NA POČETAK ---
function resetToHome() {
    const nextBtn = document.getElementById("btn-next");
    nextBtn.innerText = "Следеће";
    nextBtn.setAttribute("onclick", "nextQuestion()");
    document.getElementById("btn-submit").style.display = "inline-block";
    
    document.getElementById("question-text").className = "instruction-bar";
    
    document.getElementById("quiz-screen").style.display = "none";
    document.getElementById("home-screen").style.display = "block";

    window.location.href = "index.html";
}

// Ova funkcija se pokreće automatski čim se učita stranica kviz.html
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const izabraniPredmet = urlParams.get('predmet');
    const ucitajRandom = urlParams.get('random') === 'true'; // Читамо да ли је корисник штиклирао насумични мод

    if (izabraniPredmet && databases[izabraniPredmet]) {
        // Узимамо изворна питања из изабране области
        let pitanja = databases[izabraniPredmet];
        
        // АКО ЈЕ КОРИСНИК ОЗНАЧИО ЧЕКБОКС: Правимо копију низа и насумично мешамо редослед питања
        if (ucitajRandom) {
            pitanja = shuffleArray([...pitanja]);
        }
        
        // Покрећемо квиз са спремним низом питања
        activeQuestions = pitanja;
        currentQuestionIndex = 0;
        score = 0;
        document.getElementById("score").innerText = score;
        
        // Покрећемо тајмер (ако га користите у коду)
        if (typeof startTimer === 'function') startTimer(); 

        loadQuestion();
    } else {
        // Ако неко отвори фајл без изабраног предмета, враћа га на почетну
        window.location.href = "index.html";
    }
};


    </script>
